<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borgo Tauriana - Menu</title>
    <!-- Font di lusso da Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Plus+Jakarta+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #fcfbfa; /* Bianco caldo, rilassante per gli occhi */
            color: #1c1c1c;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 30px 20px;
        }

        /* Tasto Musica d'Atmosfera Minimalista */
        .music-toggle {
            background: none;
            border: 1px solid #1c1c1c;
            color: #1c1c1c;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 2px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s ease;
            margin-top: 20px;
        }
        .music-toggle.playing {
            background-color: #1c1c1c;
            color: #fcfbfa;
        }

        /* Intestazione raffinata */
        .brand-header {
            text-align: center;
            margin: 60px 0 50px 0;
        }
        .brand-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 400;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #121212;
        }
        .brand-header p {
            font-size: 11px;
            color: #7c7c7c;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 10px;
        }

        /* Lista dei Link - Stile Menu di un Hotel di Lusso */
        .links-list {
            width: 100%;
            max-width: 360px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 60px;
        }

        .menu-link {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 22px 10px;
            text-decoration: none;
            color: #1c1c1c;
            border-bottom: 1px solid #e8e6e3;
            transition: opacity 0.2s ease;
        }
        .menu-link:last-child {
            border-bottom: 2px solid #1c1c1c; /* Evidenzia l'azione del menu completo */
        }
        .menu-link:active {
            opacity: 0.5;
        }

        .link-title {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-style: italic;
            font-weight: 400;
        }

        .link-arrow {
            font-size: 14px;
            font-weight: 300;
            color: #7c7c7c;
        }

        .footer {
            font-size: 10px;
            color: #a0a0a0;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: auto;
            margin-bottom: 20px;
        }

        /* Iframe nascosto per la musica */
        #youtube-player {
            position: absolute;
            width: 0;
            height: 0;
            border: 0;
            visibility: hidden;
        }
    </style>
</head>
<body>

    <!-- LOGO CENTRALE -->
    <div class="brand-header">
        <h1>Borgo Tauriana</h1>
        <p>Pizzeria & Tradizione</p>
        
        <!-- TASTO MUSICA (Sotto il titolo, pulito) -->
        <button class="music-toggle" id="music-btn" onclick="toggleMusic()">
            Ascolta la location
        </button>
    </div>

    <!-- PLAYER YOUTUBE NASCOSTO (Traccia Lounge / Relax di sottofondo) -->
    <div id="player-container"></div>

    <!-- LISTA LINK MINIMALISTA -->
    <div class="links-list">
        
        <!-- Inserisci i tuoi link al posto del simbolo # -->
        <a href="#" class="menu-link">
            <span class="link-title">Antipasti</span>
            <span class="link-arrow">— scopri</span>
        </a>

        <a href="#" class="menu-link">
            <span class="link-title">Le Pizze</span>
            <span class="link-arrow">— scopri</span>
        </a>

        <a href="#" class="menu-link">
            <span class="link-title">Bevande & Cantina</span>
            <span class="link-arrow">— scopri</span>
        </a>

        <a href="#" class="menu-link">
            <span class="link-title">Desserts & Liquori</span>
            <span class="link-arrow">— scopri</span>
        </a>

        <a href="#" class="menu-link" style="margin-top: 15px;">
            <span class="link-title" style="font-weight: 600; font-style: normal;">Menu Completo PDF</span>
            <span class="link-arrow">→</span>
        </a>

    </div>

    <div class="footer">
        Un'esperienza di assoluto relax
    </div>

    <!-- SCRIPT CARICAMENTO PLAYER YOUTUBE SENZA BLOCCHI BROWSER -->
    <script>
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player-container', {
                height: '0',
                width: '0',
                videoId: 'jfKfPfyJRdk', // ID di una splendida traccia Lofi / Jazz rilassante per locali
                playerVars: {
                    'autoplay': 0,
                    'controls': 0,
                    'loop': 1,
                    'playlist': 'jfKfPfyJRdk'
                }
            });
        }

        function toggleMusic() {
            var btn = document.getElementById("music-btn");
            if (player && player.getPlayerState() === YT.PlayerState.PLAYING) {
                player.pauseVideo();
                btn.innerText = "Ascolta la location";
                btn.classList.remove("playing");
            } else if (player) {
                player.playVideo();
                player.setVolume(30); // Volume basso ed elegante, non disturba la lettura
                btn.innerText = "Musica: ON";
                btn.classList.add("playing");
            }
        }
    </script>

</body>
</html>
