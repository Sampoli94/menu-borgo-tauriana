<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borgo Tauriana - Menu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #ffffff;
            color: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Tasto Musica Minimal */
        .music-player {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: #000000;
            color: #ffffff;
            border: none;
            padding: 12px 20px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            z-index: 1000;
            text-transform: uppercase;
        }

        /* Header Brand */
        .brand-logo {
            text-align: center;
            margin: 50px 0 40px 0;
        }
        .brand-logo h1 {
            font-size: 28px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 4px;
        }
        .brand-logo p {
            font-size: 11px;
            color: #888888;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 8px;
        }

        /* Lista Card Fotografiche (Stile Gioja's / Instagram) */
        .menu-grid {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 50px;
        }

        .menu-card {
            position: relative;
            width: 100%;
            height: 140px;
            border-radius: 24px;
            overflow: hidden;
            text-decoration: none;
            box-shadow: 0 8px 20px rgba(0,0,0,0.04);
            transition: transform 0.2s ease;
        }

        .menu-card:active {
            transform: scale(0.97);
        }

        /* Immagini di sfondo eleganti e neutre (da Unsplash) */
        .card-bg {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            filter: brightness(0.65); /* Scurisce leggermente per far leggere il testo */
            transition: transform 0.5s ease;
        }

        /* Collegamento immagini a temi specifici e rilassanti */
        .bg-antipasti { background-image: url('https://images.unsplash.com/photo-1541532713592-79a0317b6b77?q=80&w=600&auto=format&fit=crop'); }
        .bg-pizze { background-image: url('https://images.unsplash.com/photo-1513104890138-7c749659a591?q=80&w=600&auto=format&fit=crop'); }
        .bg-bevande { background-image: url('https://images.unsplash.com/photo-1551024709-8f23befc6f87?q=80&w=600&auto=format&fit=crop'); }
        .bg-dessert { background-image: url('https://images.unsplash.com/photo-1587314168485-3236d6710814?q=80&w=600&auto=format&fit=crop'); }
        .bg-pdf { background-image: url('https://images.unsplash.com/photo-1544161515-4ab6ce6db874?q=80&w=600&auto=format&fit=crop'); }

        .card-text {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .footer {
            font-size: 11px;
            color: #bbbbbb;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 40px;
        }
    </style>
</head>
<body>

    <!-- LETTORE AUDIO FLOATING (Musica Vera Chillout Rilassante) -->
    <button class="music-player" onclick="controlMusic()">
        <span id="p-icon">✨</span> <span id="p-text">Atmosphere: OFF</span>
    </button>

    <!-- Traccia streaming reale: Lounge / Chillout strumentale morbidissima -->
    <audio id="ambient-audio" loop>
        <source src="https://assets.mixkit.co/music/preview/mixkit-valley-sunset-124.mp3" type="audio/mpeg">
    </audio>

    <!-- LOGO MINIMALE -->
    <div class="brand-logo">
        <h1>Borgo Tauriana</h1>
        <p>Pizzeria & Tradizione</p>
    </div>

    <!-- GRIGLIA CARD DI TENDENZA -->
    <div class="menu-grid">
        
        <!-- Sostituisci il simbolo # con il link del tuo PDF effettivo o della sezione se necessario -->
        <a href="#" class="menu-card">
            <div class="card-bg bg-antipasti"></div>
            <div class="card-text">Antipasti</div>
        </a>

        <a href="#" class="menu-card">
            <div class="card-bg bg-pizze"></div>
            <div class="card-text">Le Pizze</div>
        </a>

        <a href="#" class="menu-card">
            <div class="card-bg bg-bevande"></div>
            <div class="card-text">Bevande & Cantina</div>
        </a>

        <a href="#" class="menu-card">
            <div class="card-bg bg-dessert"></div>
            <div class="card-text">Desserts & Amari</div>
        </a>

        <a href="#" class="menu-card" style="margin-top: 10px;">
            <div class="card-bg bg-pdf" style="filter: brightness(0.45);"></div>
            <div class="card-text" style="font-weight: 700; color: #dfc294;">Sfoglia Menu Completo PDF</div>
        </a>

    </div>

    <div class="footer">
        Oasi di tranquillità e gusto
    </div>

    <script>
        var track = document.getElementById("ambient-audio");
        var pText = document.getElementById("p-text");
        var pIcon = document.getElementById("p-icon");

        function controlMusic() {
            if (track.paused) {
                track.play();
                track.volume = 0.4; /* Volume morbido di sottofondo, mai invadente */
                pText.innerText = "Atmosphere: ON";
                pIcon.innerText = "🍃";
            } else {
                track.pause();
                pText.innerText = "Atmosphere: OFF";
                pIcon.innerText = "✨";
            }
        }
    </script>

</body>
</html>
